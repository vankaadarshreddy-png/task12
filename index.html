<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
</head>
<body>

    <h1>User Registration Form</h1>
    <p>Please fill in the details below to register.</p>

    <form action="https://example.com/register" method="post">

        <!-- First Name -->
        <label for="fname">First Name:</label><br>
        <input type="text"
               id="fname"
               name="first_name"
               value="adarshreddy"
               autofocus
               required>
        <br><br>

        <!-- Last Name -->
        <label for="lname">Last Name:</label><br>
        <input type="text"
               id="lname"
               name="last_name"
               required>
        <br><br>
        <!-- Email -->
        <label for="email">Email:</label><br>
        <input type="email"
               id="email"
               name="email"
               required>
        <br><br>
